name: Docker Build

on:
  push:
    branches: [master]
    paths:
      - "dockerfiles/debian-mise.dockerfile"
      - ".github/workflows/docker-build.yml"
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Debian version from Dockerfile
        id: versions
        run: |
          DEBIAN_VERSION=$(grep '^ARG DEBIAN_VERSION=' dockerfiles/debian-mise.dockerfile | cut -d= -f2 | cut -d@ -f1)
          echo "debian_version=$DEBIAN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/debian-mise.dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/bolasblack/alca-debian:latest
            ghcr.io/bolasblack/alca-debian:${{ steps.versions.outputs.debian_version }}
