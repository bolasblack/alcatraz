name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Install nftables
        run: sudo apt-get update && sudo apt-get install -y nftables

      - name: Load nftables kernel module
        run: sudo modprobe nf_tables

      - name: Install network helper
        run: nix develop .#integration --command bash -c 'sudo "$ALCA_BIN" network-helper install --yes'

      - name: Run integration tests
        env:
          CONTAINER_RUNTIME: docker
        run: nix develop .#integration --command bash test_integration/run.sh
