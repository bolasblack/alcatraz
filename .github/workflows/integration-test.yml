name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  integration:
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel): macos-latest is ARM (M-series) which lacks nested
        # virtualization support required for Docker. Switch to macos-latest
        # when GitHub ARM runners support Docker natively.
        os: [ubuntu-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Set up Docker (macOS)
        if: runner.os == 'macOS'
        uses: docker/setup-docker-action@v5

      - name: Run integration tests
        env:
          CONTAINER_RUNTIME: docker
        run: nix develop .#integration --command bash test_integration/run.sh
