name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "hugo.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true

      - name: Generate command docs
        run: make docs-markdown

      - name: Build docs site
        run: make docs-html

      - name: Publish raw markdown files and llms.txt
        run: |
          find docs -name '*.md' | while read f; do
            dest=".hugo/output/${f#docs/}"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done
          awk 'BEGIN{fm=0} /^---$/{fm++;next} fm<2{if(fm==0)print;next} {print}' docs/llm.md > .hugo/output/llms.txt

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.hugo/output
